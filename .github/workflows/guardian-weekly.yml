name: Guardian Weekly Security Audit

on:
  schedule:
    - cron: "30 2 * * 1"
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "scripts/**"
      - "config/**"
      - ".github/workflows/guardian-weekly.yml"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: guardian-weekly
  cancel-in-progress: true

jobs:
  fetch-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Fetch open PRs
        run: python3 scripts/fetch_open_prs.py --repos-file config/repos.json > reports/open-prs.json
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Fetch CI status
        run: python3 scripts/fetch_ci_status.py --repos-file config/repos.json > reports/ci-status.json
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Fetch dependency PRs
        run: python3 scripts/fetch_renovate_prs.py --repos-file config/repos.json > reports/renovate-prs.json
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Fetch Codecov coverage
        run: python3 scripts/fetch_codecov.py --codecov-config config/codecov.json > reports/codecov.json

      - name: Fetch SonarCloud quality gates
        run: python3 scripts/fetch_sonar_gates.py --sonar-config config/sonar.json > reports/sonar-gates.json
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

      - name: Correlate CI failures
        run: python3 scripts/correlate_failures.py --ci reports/ci-status.json --renovate reports/renovate-prs.json -o reports/correlation.json

      - name: Fetch supply-chain audit
        run: python3 scripts/fetch_supply_chain.py --repos-file config/repos.json --days 7 --skip-vulns -o reports/supply-chain.json
        env:
          GH_TOKEN: ${{ secrets.AUDIT_GH_TOKEN }}

      - name: Clone audit scripts
        run: |
          git clone --depth 1 --filter=blob:none --sparse \
            https://github.com/ansible/team-devtools.git /tmp/team-devtools
          cd /tmp/team-devtools
          git sparse-checkout set .agents/skills/td-supply-chain-audit/scripts

      - name: Run full security audit (collect + analyze)
        run: |
          START_DATE=$(date -d '7 days ago' +%Y-%m-%d)
          END_DATE=$(date -d 'yesterday' +%Y-%m-%d)
          CACHE_DIR=".supply-chain-audit/cache"

          python3 /tmp/team-devtools/.agents/skills/td-supply-chain-audit/scripts/collect.py \
            --start "$START_DATE" --end "$END_DATE" --cache-dir "$CACHE_DIR"

          python3 /tmp/team-devtools/.agents/skills/td-supply-chain-audit/scripts/analyze.py \
            --cache-dir "$CACHE_DIR"
        env:
          GH_TOKEN: ${{ secrets.AUDIT_GH_TOKEN }}
          PYTHONUNBUFFERED: "1"

      - name: Convert audit to dashboard format
        run: |
          CACHE_HASH=$(ls .supply-chain-audit/cache/ | head -1)
          python3 scripts/convert_audit.py \
            --cache-dir ".supply-chain-audit/cache/$CACHE_HASH" \
            -o reports/security-audit.json

      - name: Generate full audit report
        run: |
          CACHE_HASH=$(ls .supply-chain-audit/cache/ | head -1)
          mkdir -p docs
          python3 /tmp/team-devtools/.agents/skills/td-supply-chain-audit/scripts/report.py \
            --cache-dir ".supply-chain-audit/cache/$CACHE_HASH" \
            --output docs/audit.html

      - name: Load previous snapshot from Pages
        run: |
          mkdir -p reports
          SNAPSHOT_URL="https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/snapshot.json"
          if curl -fsSL "$SNAPSHOT_URL" -o reports/previous-snapshot.json; then
            echo "Loaded previous snapshot from $SNAPSHOT_URL"
          else
            echo "No previous snapshot published yet (first run or Pages miss)"
            rm -f reports/previous-snapshot.json
          fi

      - name: Diff against previous snapshot
        run: |
          python3 scripts/diff_snapshots.py \
            --prs reports/open-prs.json \
            --ci reports/ci-status.json \
            --renovate reports/renovate-prs.json \
            --codecov reports/codecov.json \
            --sonar reports/sonar-gates.json \
            --previous reports/previous-snapshot.json \
            --output reports/changes.json \
            --write-previous reports/previous-snapshot.json

      - name: Generate HTML dashboard
        run: |
          python3 scripts/generate_dashboard.py \
            --prs reports/open-prs.json \
            --ci reports/ci-status.json \
            --renovate reports/renovate-prs.json \
            --codecov reports/codecov.json \
            --sonar reports/sonar-gates.json \
            --correlation reports/correlation.json \
            --supply-chain reports/supply-chain.json \
            --security-audit reports/security-audit.json \
            --changes reports/changes.json \
            --output docs/index.html
        env:
          GUARDIAN_GH_TOKEN: ${{ secrets.GUARDIAN_GH_TOKEN }}

      - name: Publish snapshot baseline with Pages
        run: |
          mkdir -p docs
          cp reports/previous-snapshot.json docs/snapshot.json
          cp reports/changes.json docs/changes.json

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
